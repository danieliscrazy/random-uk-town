<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Random Item</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    #item {
      font-size: 2rem;
      padding: 20px 30px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

<div id="item">Loading...</div>

<script>
async function getRandomItem() {
  const response = await fetch("query.csv");
  const text = await response.text();

  const rows = text.trim().split("\n").map(r => r.split(","));
  const headers = rows[0];
  const itemLabelIndex = headers.indexOf("itemLabel");

  if (itemLabelIndex === -1) {
    document.getElementById("item").textContent = "itemLabel column not found";
    return;
  }

  const values = rows.slice(1)
    .map(row => row[itemLabelIndex])
    .filter(v => v && v.trim() !== "");

  const random = values[Math.floor(Math.random() * values.length)];
  document.getElementById("item").textContent = random;
}

getRandomItem();
</script>

</body>
</html>
