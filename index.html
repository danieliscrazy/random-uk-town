<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Random UK Town</title>
<style>
  body {
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background: #f5f5f5;
    gap: 20px;
  }

  #item {
    font-size: 2rem;
    padding: 20px 30px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  button {
    font-size: 1rem;
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #333;
    color: white;
  }

  button:hover {
    background: #555;
  }
</style>
</head>
<body>

<div id="item"> </div>
<button onclick="showRandomItem()">New Random Town</button>

<script>
let items = [];

async function loadCSV() {
  const response = await fetch("query.csv");
  const text = await response.text();

  const rows = text.trim().split("\n").map(r => r.split(","));
  const headers = rows[0];
  const itemLabelIndex = headers.indexOf("itemLabel");

  if (itemLabelIndex === -1) {
    document.getElementById("item").textContent = "itemLabel column not found";
    return;
  }

  items = rows.slice(1)
    .map(row => row[itemLabelIndex])
    .filter(v => v && v.trim() !== "");

  showRandomItem();
}

function showRandomItem() {
  if (items.length === 0) return;

  const random = items[Math.floor(Math.random() * items.length)];
  document.getElementById("item").textContent = random;
}

loadCSV();
</script>

</body>
</html>
